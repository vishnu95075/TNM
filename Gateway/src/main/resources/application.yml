server:
  port: 9090


spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      server:
        webmvc:
          routes:
          - id: POST-SERVICE
            uri: lb://POST-SERVICE
            predicates:
              - Path=/p/**
            filters:
              - StripPrefix=1
          - id: USER-SERVICE
            uri: lb://USER-SERVICE
            predicates:
                - Path=/u/**
            filters:
              - StripPrefix=1

management.endpoints.web.exposure.include: '*'

eureka:
    client:
      serviceUrl:
        defaultZone: http://localhost:8761/eureka/
